# Grok4 Base Configuration
# This configuration defines a 1.3B parameter model suitable for experimentation

model:
  vocab_size: 50432
  n_layers: 24
  n_heads: 16
  d_model: 2048
  d_ff: 8192
  max_seq_len: 8192
  dropout: 0.1
  bias: false

training:
  # Data and batching
  batch_size: 8
  gradient_accumulation_steps: 4
  dataloader_num_workers: 4
  
  # Optimization
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  # Learning rate schedule
  warmup_steps: 1000
  max_steps: 100000
  
  # Checkpointing and logging
  save_steps: 1000
  eval_steps: 500
  logging_steps: 100
  
  # Performance optimizations
  use_mixed_precision: true
  use_gradient_checkpointing: true

inference:
  max_tokens: 100
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  repetition_penalty: 1.1
  do_sample: true
  batch_size: 1

# Logging configuration
logging:
  level: INFO
  structured: true
  rich_console: true

# Wandb configuration (optional)
wandb:
  project: "grok4-training"
  entity: null
  tags: ["grok4", "base-model"]